name: Build dist

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"

permissions:
  contents: write

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup

      - name: Build
        run: just build

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --quiet --cached || git commit -m "chore: build dist" && git push
